name: Publish Package

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-npm:
    name: Publish to npmjs.com
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build and Publish to npmjs
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if npm view @crediblemark/build@$CURRENT_VERSION version &>/dev/null; then
            echo "Version $CURRENT_VERSION is already published on npmjs.com. Skipping publish."
          else
            echo "Publishing version $CURRENT_VERSION to npmjs.com..."
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@crediblemark-official'

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Adjust scope for GitHub Packages
        run: |
          sed -i 's/"name": "@crediblemark\/build"/"name": "@crediblemark-official\/build"/' package.json

      - name: Build and Publish to GitHub Packages
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if npm view @crediblemark-official/build@$CURRENT_VERSION --registry=https://npm.pkg.github.com/ version &>/dev/null; then
            echo "Version $CURRENT_VERSION is already published on GitHub Packages. Skipping publish."
          else
            echo "Publishing version $CURRENT_VERSION to GitHub Packages..."
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
